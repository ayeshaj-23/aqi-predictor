name: AQI ML Pipeline

on:
  schedule:
    - cron: '0 * * * *'    # every hour → feature pipeline
    - cron: '0 0 * * *'    # every day at midnight → training pipeline
  workflow_dispatch:

jobs:

  # ================================
  # JOB 1: HOURLY FEATURE PIPELINE
  # ================================
  feature_pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest data
        run: python fetch_data.py
        env:
          AQICN_API_KEY: ${{ secrets.AQICN_API_KEY }}

      - name: Run Feature Engineering
        run: python utils/feature_engineering.py

      - name: Commit updated features
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add feature_store/data/
          git diff --staged --quiet || git commit -m "auto: update features [skip ci]"
          git push

  # ================================
  # JOB 2: DAILY TRAINING PIPELINE
  # ================================
  training_pipeline:
    runs-on: ubuntu-latest
    needs: feature_pipeline
    if: always()
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Feast Apply
        run: |
          cd feature_store
          feast apply

      - name: Run Training Pipeline
        run: python src/train_model.py

      - name: Commit updated models
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add model_registry/
          git diff --staged --quiet || git commit -m "auto: update models [skip ci]"
          git push